name: Publish
run-name: Publish (${{ inputs.dry_run && 'Dry' || 'Real' }})

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        description: dry run?
        default: true

jobs:
  prepare_npm_for_publish:
    uses: ./.github/workflows/prepare-npm-for-publish.yml
  publish_npm:
    runs-on: ubuntu-latest
    needs: [prepare_npm_for_publish]
    steps:
      - uses: actions/checkout@v4
      - name: Dry run
        if: inputs.dry_run == true
        uses: ./.github/actions/publish-npm-dry-run
      - name: Real publish
        if: inputs.dry_run == false
        uses: ./.github/actions/publish-npm
  prepare_for_github_release:
    needs: [publish_npm]
    uses: ./.github/workflows/prepare-npm-for-publish.yml
  publish_github_release:
    runs-on: ubuntu-latest
    needs: [prepare_for_github_release]
    steps:
      - uses: actions/checkout@v4
      - name: Dry run
        if: inputs.dry_run == true
        uses: ./.github/actions/publish-npm-dry-run
      - name: Real publish
        if: inputs.dry_run == false
        uses: ./.github/actions/publish-npm