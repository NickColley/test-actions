name: notice

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        description: Dry run
        default: true

jobs:
  publish_npm:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm pack
        id: pack
        run: |
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          # Redirect the stderr which contains the useful meta data to the Action summary
          ARCHIVE_FILE_PATH=$(npm pack 2>> $GITHUB_STEP_SUMMARY)
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "ARCHIVE_FILE_PATH=${ARCHIVE_FILE_PATH}" >> $GITHUB_OUTPUT
      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{steps.pack.outputs.ARCHIVE_FILE_PATH}}
          archive: false # file is already archived
      - name: publish
        run: npm publish ${{ inputs.dry_run == true && '--dry-run' || '' }}

