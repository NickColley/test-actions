name: notice

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        description: Dry run
        default: true

jobs:
  publish_npm:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm pack
        id: pack
        run: |
          FILE_PATH=$(npm pack)
          echo "ARCHIVE_FILE_PATH=${FILE_PATH}" >> $GITHUB_OUTPUT
      - name: notice
        run: echo "::notice file=${{steps.pack.outputs.ARCHIVE_FILE_PATH}}::Archive created"
      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: steps.pack.outputs.ARCHIVE_FILE_PATH
          archive: false # already archived
      - name: Adding markdown
        run: echo '### Hello world! 🚀' >> $GITHUB_STEP_SUMMARY