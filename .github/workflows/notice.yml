name: notice

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        description: Dry run
        default: true

jobs:
  publish_npm:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm pack
        id: pack
        run: |
          # Assign the result of npm pack to a variable
          # Redirect the stderr to the summary so we can see the package output easier
          FILE_PATH=$(npm pack) 2>> $GITHUB_STEP_SUMMARY
          echo "ARCHIVE_FILE_PATH=${FILE_PATH}" >> $GITHUB_OUTPUT
      - name: notice
        run: echo "::notice file=${{steps.pack.outputs.ARCHIVE_FILE_PATH}}::Archive created"
      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{steps.pack.outputs.ARCHIVE_FILE_PATH}}
          archive: false # already archived
      - name: Adding markdown
        run: |
          FILES_IN_ARCHIVE=$(tar -ztvf test-actions-1.0.0.tgz)
          echo '### Hello world! 🚀' >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo ${FILES_IN_ARCHIVE} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: publish
        run: npm publish ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}

